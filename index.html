<style>
  :root{

  body{

    line-height:1.7;
    position:relative;

  }

  .blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.55}
  .blob-1{width:420px;height:420px;top:-140px;left:-120px;background:radial-gradient(circle at 30% 30%,var(--blue),transparent 70%)}
  .blob-2{width:380px;height:380px;top:20%;right:-160px;background:radial-gradient(circle at 60% 40%,var(--purple),transparent 70%)}
  .blob-3{width:340px;height:340px;bottom:-120px;left:10%;background:radial-gradient(circle at 50% 50%,var(--green),transparent 70%)}

  .wrap{width:100%;max-width:560px;position:relative;z-index:1}

  header.brand{text-align:center;margin-bottom:24px}
  .brand-title{font-size:37px;font-weight:800;letter-spacing:.3px;line-height:1.4}
  .brand-title .line1{display:block;color:var(--ink)}
  .brand-title .line2{
    display:block;
    background:linear-gradient(90deg,var(--blue-deep),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tagline{
    display:inline-block;font-size:18px;font-weight:600;letter-spacing:1.5px;
    color:var(--blue-deep);
    background:rgba(155,127,232,0.14);
    padding:5px 16px;border-radius:999px;margin-top:12px;
  }

  .progress-shell{
    height:8px;background:rgba(120,120,128,0.16);border-radius:99px;overflow:hidden;
    margin:24px 0 8px;
  }
  .progress-bar{
    height:100%;width:0;
    background:linear-gradient(90deg,var(--blue),var(--purple));
    border-radius:99px;transition:width .35s ease;
  }
  .progress-text{text-align:right;font-size:17px;color:var(--ink-soft);margin-bottom:18px}

  .card{
    background:var(--glass-bg);

    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:26px;
    box-shadow:var(--shadow);
    padding:32px 26px;
    animation:rise .4s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .q-num{font-size:18px;color:var(--blue-deep);font-weight:700;letter-spacing:1px;margin-bottom:10px}
  .q-title{font-size:26px;font-weight:700;margin-bottom:10px;line-height:1.5}
  .q-title.big{font-size:36px}
  .q-hint{font-size:19px;color:var(--ink-soft);margin-bottom:20px;white-space:pre-line;line-height:1.7}
  .q-hint.warn{
    font-size:22px;line-height:1.7;
    background:rgba(242,166,90,0.16);border-left:4px solid var(--orange);
    padding:12px 16px;border-radius:10px;color:#8a5a00;
  }

  .none-toggle{
    display:flex;align-items:center;gap:12px;min-height:54px;
    border:1.5px dashed var(--line);border-radius:14px;
    padding:14px 18px;cursor:pointer;background:rgba(255,255,255,0.4);
    transition:border .2s,background .2s;font-size:20px;font-weight:600;color:var(--ink-soft);
    margin-bottom:14px;
    -webkit-tap-highlight-color:transparent;-webkit-transform:translateZ(0);transform:translateZ(0);
  }
  .none-toggle:hover{border-color:var(--blue)}
  .none-toggle.selected{
    border-style:solid;border-color:var(--blue-deep);
    background:rgba(155,127,232,0.16);color:var(--blue-deep);
  }
  .none-toggle input{accent-color:var(--blue);width:20px;height:20px;flex:0 0 auto}

  .quick-fill{
    position:relative;z-index:0;
    display:inline-flex;align-items:center;gap:8px;
    font-family:inherit;font-size:19px;font-weight:600;
    border:1.5px solid var(--blue);border-radius:999px;
    padding:10px 18px;cursor:pointer;background:transparent;color:var(--blue-deep);
    margin-bottom:14px;transition:border-color .15s,color .15s;
    -webkit-tap-highlight-color:transparent;-webkit-transform:translateZ(0);transform:translateZ(0);
  }
  .quick-fill:hover{border-color:var(--blue-deep)}
  .chip-fill{
    position:absolute;inset:0;border-radius:inherit;z-index:-1;
    opacity:0;transition:opacity .15s ease;pointer-events:none;
  }
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
  .chips .quick-fill{margin-bottom:0}

  .history-label{font-size:16px;font-weight:600;color:var(--ink-soft);margin-bottom:10px}
  .history-fill{
    border-color:var(--rose) !important;color:#a84f74 !important;
  }
  .history-fill:hover{border-color:#a84f74 !important}

  .portion-label{font-size:18px;font-weight:700;color:var(--ink);margin:18px 0 12px}
  .portion-options{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
  .portion-opt{
    position:relative;z-index:0;
    font-family:inherit;font-size:17px;font-weight:600;
    border:1.5px solid var(--line);border-radius:999px;
    padding:11px 18px;cursor:pointer;background:transparent;color:var(--ink);
    transition:border-color .15s,color .15s;display:inline-flex;align-items:center;
    -webkit-tap-highlight-color:transparent;-webkit-transform:translateZ(0);transform:translateZ(0);
  }
  .portion-opt input{position:absolute;opacity:0;pointer-events:none}
  .portion-opt:hover{border-color:var(--green)}

  input[type=text],input[type=date],input[type=time],textarea{
    width:100%;font-family:inherit;font-size:22px;color:var(--ink);
    border:1.5px solid var(--line);border-radius:14px;
    padding:15px 16px;background:rgba(255,255,255,0.7);
    transition:border .2s,box-shadow .2s,opacity .2s;
  }
  input:focus,textarea:focus{
    outline:none;border-color:var(--blue);
    box-shadow:0 0 0 4px rgba(155,127,232,0.22);
  }
  input:disabled{
    opacity:.45;background:rgba(120,120,128,0.1);cursor:not-allowed;
  }
  textarea{resize:none;min-height:58px;line-height:1.4;overflow:hidden;transition:height .1s ease}

  .options{display:flex;flex-direction:column;gap:12px}
  .opt{
    display:flex;align-items:flex-start;gap:12px;min-height:58px;

    0%{box-shadow:0 0 0 0 rgba(155,127,232,0.55)}
    70%{box-shadow:0 0 0 22px rgba(155,127,232,0)}

    100%{box-shadow:0 0 0 0 rgba(242,166,201,0)}

  .skip-btn{
    display:block;text-align:center;margin-top:14px;color:var(--ink-soft);

  .inspire-close{
    position:absolute;top:16px;right:16px;

<script>
function todayStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function nowStr(){
  const d = new Date();
  const h = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${h}:${mi}`;
}
function getWeekday(iso){
  if(!iso) return "";
  const days = ["日","一","二","三","四","五","六"];
  const d = new Date(iso + "T00:00:00");
  if(isNaN(d.getTime())) return "";
  return "星期" + days[d.getDay()];
}
function isWeekend(iso){
  if(!iso) return false;
  const d = new Date(iso + "T00:00:00");
  if(isNaN(d.getTime())) return false;
  const day = d.getDay();
  return day === 0 || day === 6;
}

// ⚠️ 每年更新一次：這是台灣的國定假日清單（含補假），資料來源為行政院人事行政總處公告。
// 每年約六月底會公告次年的辦公日曆表，屆時把新的日期換進這個陣列即可，格式是「YYYY-MM-DD」。
const HOLIDAYS_2026 = [
  "2026-01-01", // 元旦
  "2026-02-15", // 小年夜
  "2026-02-16", // 除夕
  "2026-02-17", // 初一
  "2026-02-18", // 初二
  "2026-02-19", // 初三
  "2026-02-20", // 小年夜補假
  "2026-02-27", // 和平紀念日補假
  "2026-02-28", // 和平紀念日
  "2026-04-03", // 兒童節補假
  "2026-04-04", // 兒童節
  "2026-04-05", // 清明節
  "2026-05-01", // 勞動節
  "2026-06-19", // 端午節
  "2026-09-25", // 中秋節
  "2026-09-28", // 教師節（孔子誕辰紀念日）
  "2026-10-09", // 國慶日補假
  "2026-10-10", // 國慶日
  "2026-10-25", // 台灣光復節
  "2026-10-26", // 台灣光復節補假
  "2026-12-25"  // 行憲紀念日
];

function isHoliday(iso){
  return HOLIDAYS_2026.includes(iso);
}

function isCheatDay(iso){
  return isWeekend(iso) || isHoliday(iso);
}

const HISTORY_STORAGE_KEY = "mealLogHistory_v1";
const HISTORY_MAX = 6;

function loadHistory(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY) || "{}");
  }catch(e){
    return {};
  }
}
function saveHistoryToStorage(history){
  try{
    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(history));
  }catch(e){
    // 私密瀏覽模式或儲存空間被封鎖時，安靜地放棄，不影響其他功能
  }
}
const history = loadHistory();

function rememberHistory(key, rawValue){
  const items = String(rawValue).split(/、|,|，/).map(s=>s.trim()).filter(Boolean);
  if(items.length === 0) return;
  let list = history[key] || [];
  items.forEach(item=>{
    list = list.filter(x=>x !== item);
    list.unshift(item);
  });
  history[key] = list.slice(0, HISTORY_MAX);
  saveHistoryToStorage(history);
}

function fullMealQuestions(mealKey, mealLabel){

function cheatBoxQuestion(mealKey, mealLabel){

}

// 依「今天的節奏」決定早、午、晚餐各自要用哪一種題組；午餐固定是完整四分類，因為168斷食不會斷在午餐
function mealBlockForPattern(pattern){
  const breakfastBlock = pattern === "早上斷食" ? [fastingBoxQuestion("breakfast","早餐")] : fullMealQuestions("breakfast","早餐");
  const dinnerBlock = pattern === "晚上斷食" ? [fastingBoxQuestion("dinner","晚餐")] : fullMealQuestions("dinner","晚餐");
  return [...breakfastBlock, ...fullMealQuestions("lunch","午餐"), ...dinnerBlock];
}

// 作弊日用：早、午、晚都是自由填空
function cheatMealQuestions(){
  return [
    cheatBoxQuestion("breakfast_free","早餐"),
    cheatBoxQuestion("lunch_free","午餐"),
    cheatBoxQuestion("dinner_free","晚餐")
  ];
}

let questions = [...HEAD_QUESTIONS, MEAL_PATTERN_QUESTION, ...mealBlockForPattern("三餐"), TOOLS_QUESTION];

const answers = {};
const noneAnswers = {};
const portionAnswers = {};
function registerAnswerKeys(list){
  list.forEach(q=>{
    if(!(q.key in answers)) answers[q.key] = q.default || "";
    if(!(q.key in noneAnswers)) noneAnswers[q.key] = false;
    if(!(q.key in portionAnswers)) portionAnswers[q.key] = "";
  });
}
registerAnswerKeys(questions);

// 離開日期頁時呼叫：平日直接問「今天的節奏」；週末或國定假日先問作弊餐還是減醣餐
function rebuildAfterDate(){
  if(isCheatDay(answers.date)){
    questions = [...HEAD_QUESTIONS, DAY_CHOICE_QUESTION, ...mealBlockForPattern(answers.mealPattern || "三餐"), TOOLS_QUESTION];
  } else {
    answers.dayChoice = ""; // 清掉可能殘留的舊選擇，避免日期改回平日後仍誤判
    questions = [...HEAD_QUESTIONS, MEAL_PATTERN_QUESTION, ...mealBlockForPattern(answers.mealPattern || "三餐"), TOOLS_QUESTION];
  }
  registerAnswerKeys(questions);
}

// 離開「今天怎麼吃」選擇題時呼叫：選作弊餐就直接進自由填空，不再多問節奏；選減醣餐才接著問今天的節奏
function rebuildAfterDayChoice(){
  if(answers.dayChoice === "作弊餐"){
    answers.mealPattern = ""; // 作弊日不需要節奏這一題，清掉殘留答案
    questions = [...HEAD_QUESTIONS, DAY_CHOICE_QUESTION, ...cheatMealQuestions(), TOOLS_QUESTION];
  } else {
    questions = [...HEAD_QUESTIONS, DAY_CHOICE_QUESTION, MEAL_PATTERN_QUESTION, ...mealBlockForPattern(answers.mealPattern || "三餐"), TOOLS_QUESTION];
  }
  registerAnswerKeys(questions);
}

// 離開「今天的節奏」這一題時呼叫：依早上斷食／晚上斷食／三餐，決定早晚餐各自的題組
function rebuildAfterMealPattern(){
  const hasDayChoice = questions.some(q=>q.key==="dayChoice");
  const head = hasDayChoice ? [...HEAD_QUESTIONS, DAY_CHOICE_QUESTION, MEAL_PATTERN_QUESTION] : [...HEAD_QUESTIONS, MEAL_PATTERN_QUESTION];
  questions = [...head, ...mealBlockForPattern(answers.mealPattern), TOOLS_QUESTION];
  registerAnswerKeys(questions);
}

let idx = 0;
const app = document.getElementById("app");

function render(){

    const pastItems = q.noHistory ? [] : (history[q.key] || []).filter(item => !presetList.includes(item));
    if(pastItems.length > 0){
      const current = answers[q.key].split(/、|,|，/).map(s=>s.trim()).filter(Boolean);
      const histBtnStyle = `border-color:#F2A6C9;border-width:4px;font-weight:800;color:#fff`;
      historyHtml = `<div class="history-label">你上次還${q.verb||"吃"}過</div><div class="chips">` + pastItems.map(val=>{

      const sel = current.includes(o);

      <div class="q-num">${q.label}</div>

        <button class="btn btn-primary" onclick="next(event)">${idx===questions.length-1?"完成紀錄":"下一項"}</button>
      </div>
      ${q.skippable?`<button class="skip-btn" onclick="skipField(event)">不想寫，直接跳過</button>`:``}

}

function autoGrow(el){
  if(!el) return;
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

function wire(q){
  if(q.type==="text"){
    const fld = document.getElementById("fld");
    if(fld){
      autoGrow(fld);
      fld.addEventListener("input", ()=>autoGrow(fld));
    }
    const chk = document.getElementById("noneChk");
    if(chk){
      chk.addEventListener("change", ()=>{
        noneAnswers[q.key] = chk.checked;
        const f = document.getElementById("fld");
        if(chk.checked){
          answers[q.key] = "";
          f.value = "";
          f.disabled = true;
        } else {
          f.disabled = false;
          f.focus();
        }
        chk.closest(".none-toggle").classList.toggle("selected", chk.checked);
        render();
      }, {once:false});
    }
  }
  if(q.type==="radio"){
    app.querySelectorAll('input[name=r]').forEach(r=>{
      r.addEventListener("change",()=>{
        answers[q.key]=r.value;
        app.querySelectorAll(".opt").forEach(o=>o.classList.remove("selected"));
        r.closest(".opt").classList.add("selected");
      });
    });
  }
  if(q.type==="multiselect"){
    app.querySelectorAll('input[name=m]').forEach(c=>{
      c.addEventListener("change",()=>{
        let items = answers[q.key] ? answers[q.key].split(/、|,|，/).map(s=>s.trim()).filter(Boolean) : [];
        if(c.checked){ if(!items.includes(c.value)) items.push(c.value); }
        else { items = items.filter(v=>v!==c.value); }
        answers[q.key] = items.join("、");
        c.closest(".opt").classList.toggle("selected", c.checked);
      });
    });
  }
  if(q.type==="date"){
    const fld = document.getElementById("fld");
    if(fld){
      fld.addEventListener("input", ()=>{
        answers[q.key] = fld.value;
        const wd = document.getElementById("weekdayDisplay");
        if(wd) wd.textContent = getWeekday(fld.value);
      });
    }
  }
}

function selectPortion(e, val){
  e.preventDefault();
  const q = questions[idx];
  const f = document.getElementById("fld");
  if(f && !f.disabled) answers[q.key] = f.value.trim();
  // 再點一次同一個選項可以取消
  portionAnswers[q.key] = (portionAnswers[q.key] === val) ? "" : val;
  noneAnswers[q.key] = (portionAnswers[q.key] === "沒吃");
  if(noneAnswers[q.key]) answers[q.key] = "";
  render();
}

function paintChip(btn, selected){
  // 邊框粗細與色塊透明度雙管齊下：透明度變化是瀏覽器動畫的地基，
  // 不可能被跳過，用來繞開手機瀏覽器在毛玻璃背景下不重繪背景色的問題
  const fillSpan = btn.querySelector(".chip-fill");
  const checkSpan = btn.querySelector(".chip-check");
  if(selected){
    btn.classList.add("selected");
    btn.style.color = "#ffffff";
    btn.style.borderWidth = "4px";
    btn.style.fontWeight = "800";
    if(fillSpan) fillSpan.style.opacity = "1";
    if(checkSpan) checkSpan.textContent = "✓ ";
  } else {
    btn.classList.remove("selected");
    btn.style.color = "";
    btn.style.borderWidth = "";
    btn.style.fontWeight = "";
    if(fillSpan) fillSpan.style.opacity = "0";
    if(checkSpan) checkSpan.textContent = "";
  }
}

function toggleQuickFill(e, val){
  e.preventDefault();
  const btn = e.currentTarget;
  const f = document.getElementById("fld");
  let items = f.value.split(/、|,|，/).map(s=>s.trim()).filter(Boolean);
  const i = items.indexOf(val);
  if(i > -1){ items.splice(i,1); paintChip(btn, false); }
  else { items.push(val); paintChip(btn, true); }
  f.value = items.join("、");
  answers[questions[idx].key] = f.value;
  autoGrow(f);
}

function saveCurrent(){
  const f=document.getElementById("fld");
  const q = questions[idx];
  if(f && !f.disabled){
    answers[q.key]=f.value.trim();
    if(q.type==="text" && !q.noHistory && answers[q.key]) rememberHistory(q.key, answers[q.key]);
  }
}

function flash(e){
  if(!e || !e.currentTarget) return;
  const el = e.currentTarget;
  el.classList.remove("glow");
  void el.offsetWidth;
  el.classList.add("glow");
  setTimeout(()=>el.classList.remove("glow"),650);
}

function next(e){
  flash(e);
  saveCurrent();
  const leavingKey = questions[idx].key;
  if(leavingKey === "date") rebuildAfterDate();
  else if(leavingKey === "dayChoice") rebuildAfterDayChoice();
  else if(leavingKey === "mealPattern") rebuildAfterMealPattern();
  idx++;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}
function prev(e){ flash(e); saveCurrent(); idx--; render(); window.scrollTo({top:0,behavior:"smooth"}); }
function skipField(e){
  answers[questions[idx].key] = "";
  idx++;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function formatDate(iso){
  if(!iso) return "";
  const [y,m,d] = iso.split("-");
  return `${y}／${m}／${d}`;
}

// 依目前的答案，組出某一餐要顯示的文字區塊（自由填空 / 斷食簡易 / 完整四分類）
function mealTextBlock(mealKey, mealLabel, mode){
  if(mode === "cheat"){
    return [`${mealLabel}：${answers[`${mealKey}_free`]}`, ""];
  }
  if(mode === "fasting"){
    return [`${mealLabel}：${answers[mealKey]}`, ""];
  }
  return [
    mealLabel,
    `☐ 澱粉：${answers[`${mealKey}_starch`]}`,
    `☐ 蛋白質：${answers[`${mealKey}_protein`]}`,
    `☐ 蔬菜：${answers[`${mealKey}_veggie`]}`,
    `☐ 飲料／湯品：${answers[`${mealKey}_drink`]}`,
    ""
  ];
}

function buildText(){
  const isCheat = answers.dayChoice ? (answers.dayChoice === "作弊餐") : isCheatDay(answers.date);
  const title = isCheat ? "作弊餐紀錄表" : "減醣餐紀錄表";
  const lines = [];

  if(answers.mood){ lines.push(answers.mood, ""); }
  if(answers.quote){ lines.push(answers.quote, ""); }

  lines.push(
    `日期：${formatDate(answers.date)}（${getWeekday(answers.date)}）`,
    "",
    `【${title}】`
  );

  if(isCheat){
    lines.push(...mealTextBlock("breakfast","早餐","cheat"));
    lines.push(...mealTextBlock("lunch","午餐","cheat"));
    lines.push(...mealTextBlock("dinner","晚餐","cheat"));
  } else {
    const breakfastMode = answers.mealPattern === "早上斷食" ? "fasting" : "full";
    const dinnerMode = answers.mealPattern === "晚上斷食" ? "fasting" : "full";
    lines.push(...mealTextBlock("breakfast","早餐",breakfastMode));
    lines.push(...mealTextBlock("lunch","午餐","full"));
    lines.push(...mealTextBlock("dinner","晚餐",dinnerMode));
  }

  lines.push(
    `☐ 減醣神器：${answers.tools}`,
    "👇     👇",
    "🛒《💯官方正品 黑蒜醋、白腎豆、牛蒡茶》",
    "立刻逛逛👉 pse.is/唐奇嚴選",
    "💬聯絡客服👉 pse.is/唐奇嚴選客服"
  );
  return lines.join("\n");
}

function renderReview(){
  const text=buildText();
  app.className="review";
  app.innerHTML=`
    <div class="progress-shell"><div class="progress-bar" style="width:100%"></div></div>
    <div class="progress-text">全部完成✔</div>
    <div class="card">
      <h2>紀錄完成，辛苦了！</h2>
      <div class="sub">請確認以下內容，按下按鈕後就能分享到社團。</div>
      <div class="summary">${escapeHtml(text)}</div>
      <button class="btn copy-btn" onclick="copyText(event)">複製這一份紀錄</button>
      <div class="toast" id="toast">已複製文字，貼到社團分享吧✅</div>
      <button class="edit-link" onclick="idx=0;render()">回去修改內容</button>
    </div>`;
}

let inspireLastIndex = -1;

function pickInspireLine(type){
  const pool = type === "quote" ? QUOTE_LINES : MOOD_PROMPTS;
  if(pool.length === 0) return "";
  let i = Math.floor(Math.random() * pool.length);
  if(pool.length > 1){
    while(i === inspireLastIndex) i = Math.floor(Math.random() * pool.length);
  }
  inspireLastIndex = i;
  return pool[i];
}

function openInspire(type, silent){
  const line = pickInspireLine(type);
  const root = document.getElementById("inspireRoot");
  const isQuote = type === "quote";
  const eyebrow = isQuote ? "金句靈感" : "心情靈感";
  const copyBtn = isQuote
    ? `<button type="button" class="inspire-copy" onclick="useInspireQuote(event)">📤 分享這句</button>`
    : "";
  root.innerHTML = `
    <div class="inspire-overlay" onclick="if(event.target===this) closeInspire()">
      <div class="inspire-modal">
        <button type="button" class="inspire-close" onclick="closeInspire()">✕</button>
        <div class="inspire-eyebrow">${eyebrow}</div>
        <div class="inspire-text" id="inspireLineText">${escapeHtml(line)}</div>
        ${copyBtn}
        <div class="inspire-nav">
          <button type="button" class="btn btn-ghost" onclick="openInspire('${type}')">🔄 換一句</button>
          <button type="button" class="btn btn-primary" onclick="closeInspire()">關閉，開始寫</button>
        </div>
      </div>
    </div>`;
}

function closeInspire(){
  const root = document.getElementById("inspireRoot");
  if(root) root.innerHTML = "";
}

function useInspireQuote(e){
  const text = document.getElementById("inspireLineText").textContent;
  const f = document.getElementById("fld");
  if(f){
    f.value = text;
    answers[questions[idx].key] = text;
    autoGrow(f);
    f.focus();
  }
  closeInspire();
}

function copyText(e){
  flash(e);
  const text=buildText();
  const done=()=>{const t=document.getElementById("toast");t.classList.add("show");};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else fallback(text,done);
}
function fallback(text,done){
  const ta=document.createElement("textarea");
  ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");done();}catch(e){alert("複製失敗，請手動選取文字");}
  document.body.removeChild(ta);
}

function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escapeAttr(s){return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;");}

render();
</script>
